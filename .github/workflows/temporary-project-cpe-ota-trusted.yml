name: Temporary trusted project-cpe OTA build

on:
  pull_request:
    branches: [main]
    paths:
      - project-cpe-macos-ncm-stability.patch
      - project-cpe-ota-trigger.txt

permissions:
  contents: read

jobs:
  build-ota:
    name: Build and validate UDX710 OTA
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout temporary build inputs
        uses: actions/checkout@v4

      - name: Checkout pinned project-cpe source
        uses: actions/checkout@v4
        with:
          repository: 1orz/project-cpe
          ref: 9402522cfabe7f4e08c72a1f7ce556a6137190c0
          path: project-cpe
          fetch-depth: 1
          persist-credentials: false

      - name: Apply and inspect stability patch
        shell: bash
        run: |
          set -euo pipefail
          git -C project-cpe apply --check "$GITHUB_WORKSPACE/project-cpe-macos-ncm-stability.patch"
          git -C project-cpe apply "$GITHUB_WORKSPACE/project-cpe-macos-ncm-stability.patch"
          git -C project-cpe diff --check
          git -C project-cpe diff --stat

      - name: Set experimental version 3.4.1
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          root = Path('project-cpe')
          (root / 'VERSION').write_text('3.4.1\n', encoding='utf-8')

          cargo = root / 'backend' / 'Cargo.toml'
          text = cargo.read_text(encoding='utf-8')
          old = 'version = "3.4.0"'
          if old not in text:
              raise SystemExit('expected backend version 3.4.0 not found')
          cargo.write_text(text.replace(old, 'version = "3.4.1"', 1), encoding='utf-8')

          package = root / 'frontend' / 'package.json'
          text = package.read_text(encoding='utf-8')
          old = '"version": "3.4.0"'
          if old not in text:
              raise SystemExit('expected frontend version 3.4.0 not found')
          package.write_text(text.replace(old, '"version": "3.4.1"', 1), encoding='utf-8')
          PY

      - name: Prepare Rust and Zig cross toolchain
        shell: bash
        run: |
          set -euo pipefail
          rustc --version
          cargo --version
          rustup target add aarch64-unknown-linux-musl
          rustup component add rustfmt
          python3 -m pip install --user --disable-pip-version-check 'ziglang==0.13.0'
          mkdir -p "$HOME/.local/bin"
          cat > "$HOME/.local/bin/zig" <<'SH'
          #!/bin/sh
          exec python3 -m ziglang "$@"
          SH
          chmod +x "$HOME/.local/bin/zig"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.local/bin:$PATH"
          zig version
          cargo install cargo-zigbuild --locked
          cargo zigbuild --version

      - name: Format, test, and cross-compile backend
        working-directory: project-cpe/backend
        env:
          SQLITE3_STATIC: '1'
          LIBSQLITE3_SYS_USE_PKG_CONFIG: '0'
          GIT_COMMIT: 9402522-macncm1
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --all --check
          cargo test --locked
          cargo zigbuild --release --target aarch64-unknown-linux-musl
          file target/aarch64-unknown-linux-musl/release/udx710
          file target/aarch64-unknown-linux-musl/release/udx710 | grep -q 'ARM aarch64'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: project-cpe/frontend/package.json

      - name: Build frontend
        working-directory: project-cpe/frontend
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@9 --activate
          pnpm install --frozen-lockfile
          pnpm run build
          test -f dist/index.html

      - name: Package and validate exact OTA format
        id: package
        shell: bash
        run: |
          set -euo pipefail
          cd project-cpe
          VERSION="$(tr -d '[:space:]' < VERSION)"
          BUILD_TIME="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          BINARY='backend/target/aarch64-unknown-linux-musl/release/udx710'
          OTA_TMP="$(mktemp -d)"
          mkdir -p "$OTA_TMP/www" release
          cp "$BINARY" "$OTA_TMP/udx710"
          chmod 755 "$OTA_TMP/udx710"
          cp -a frontend/dist/. "$OTA_TMP/www/"

          OTA_TMP="$OTA_TMP" VERSION="$VERSION" BUILD_TIME="$BUILD_TIME" python3 - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          root = Path(os.environ['OTA_TMP'])

          def md5_file(path: Path) -> str:
              digest = hashlib.md5()
              with path.open('rb') as handle:
                  for chunk in iter(lambda: handle.read(1024 * 1024), b''):
                      digest.update(chunk)
              return digest.hexdigest()

          hashes = sorted(md5_file(path) for path in (root / 'www').rglob('*') if path.is_file())
          payload = '\n'.join(hashes)
          if payload:
              payload += '\n'

          meta = {
              'version': os.environ['VERSION'],
              'commit': '9402522-macncm1',
              'build_time': os.environ['BUILD_TIME'],
              'binary_md5': md5_file(root / 'udx710'),
              'frontend_md5': hashlib.md5(payload.encode()).hexdigest(),
              'arch': 'aarch64-unknown-linux-musl',
          }
          (root / 'meta.json').write_text(json.dumps(meta, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          print(json.dumps(meta, indent=2))
          PY

          OTA_FILE="release/udx710-ota-${VERSION}-macos-ncm-fix1.tar.gz"
          tar -C "$OTA_TMP" -czf "$OTA_FILE" meta.json udx710 www

          OTA_FILE="$OTA_FILE" python3 - <<'PY'
          import hashlib
          import json
          import os
          import subprocess
          import tarfile
          import tempfile
          from pathlib import Path

          ota = Path(os.environ['OTA_FILE'])
          root = Path(tempfile.mkdtemp(prefix='ota-verify-'))

          with tarfile.open(ota, 'r:gz') as archive:
              names = archive.getnames()
              required = {'meta.json', 'udx710', 'www'}
              if not required.issubset({name.rstrip('/') for name in names}):
                  raise SystemExit(f'missing required OTA entries: {required}; got {names[:20]}')
              archive.extractall(root, filter='data')

          def md5_file(path: Path) -> str:
              digest = hashlib.md5()
              with path.open('rb') as handle:
                  for chunk in iter(lambda: handle.read(1024 * 1024), b''):
                      digest.update(chunk)
              return digest.hexdigest()

          meta = json.loads((root / 'meta.json').read_text(encoding='utf-8'))
          hashes = sorted(md5_file(path) for path in (root / 'www').rglob('*') if path.is_file())
          payload = '\n'.join(hashes)
          if payload:
              payload += '\n'
          frontend_md5 = hashlib.md5(payload.encode()).hexdigest()

          assert meta['version'] == '3.4.1'
          assert meta['arch'] == 'aarch64-unknown-linux-musl'
          assert meta['binary_md5'] == md5_file(root / 'udx710')
          assert meta['frontend_md5'] == frontend_md5
          assert (root / 'www' / 'index.html').is_file()
          output = subprocess.check_output(['file', str(root / 'udx710')], text=True)
          assert 'ARM aarch64' in output, output
          print('OTA validation passed')
          print(output.strip())
          PY

          sha256sum "$OTA_FILE" | tee release/SHA256SUMS.txt
          md5sum "$OTA_FILE" | tee release/MD5SUMS.txt
          tar -tzf "$OTA_FILE" | head -30
          echo "ota_file=$OTA_FILE" >> "$GITHUB_OUTPUT"

      - name: Upload OTA artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-cpe-macos-ncm-fix1
          path: |
            project-cpe/release/*.tar.gz
            project-cpe/release/SHA256SUMS.txt
            project-cpe/release/MD5SUMS.txt
          retention-days: 7
          if-no-files-found: error
